<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>Nuevo Producto</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/stylesVendedor.css') }}">

</head>
<body>

<div class="contenedor">

    <h1>Nuevo Producto</h1>

    <form method="POST">

        <input type="text"
               name="nombre"
               placeholder="Nombre"
               required>

        <input type="text"
               name="categoria"
               placeholder="Categoría"
               required>

        <input type="number"
               step="0.01"
               name="precio"
               placeholder="Precio"
               required>

        <input type="number"
               name="stock"
               placeholder="Stock"
               required>

        <textarea
            name="descripcion"
            placeholder="Descripción">
        </textarea>

        <input type="text"
               name="imagen"
               placeholder="arroz.jpg">

        <button type="submit">
            Guardar
        </button>

    </form>

</div>

</body>
</html>
