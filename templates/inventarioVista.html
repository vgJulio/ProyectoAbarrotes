<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario ABBA</title>

```
<link rel="stylesheet"
      href="{{ url_for('static', filename='css/stylesInventario.css') }}">
```

</head>
<body>

<header>

```
<div class="header-text">
    <h1>Inventario ABBA</h1>
    <p>Administración de productos registrados.</p>
</div>

<div class="header-actions">

    <a href="{{ url_for('nuevoProducto') }}">
        <button class="btn-header">
            + Nuevo Producto
        </button>
    </a>

    <a href="{{ url_for('verPedidos') }}">
        <button class="btn-header">
            Ver Pedidos
        </button>
    </a>

    <a href="{{ url_for('login') }}">
        <button class="btn-volver">
            Salir
        </button>
    </a>

</div>
```

</header>

<main class="contenedor">

```
{% if productos %}

<section class="grid-productos">

    {% for producto in productos %}

    <article class="card"

        data-id="{{ producto._id }}"
        data-nombre="{{ producto.nombre }}"
        data-categoria="{{ producto.categoria }}"
        data-precio="{{ producto.precio }}"
        data-stock="{{ producto.stock }}"
        data-desc="{{ producto.descripcion }}"
        data-img="{{ url_for('static',
        filename='img/' ~ producto.imagen) }}">

        <div class="img-container">

            <img src="{{ url_for('static',
                filename='img/' ~ producto.imagen) }}"

                alt="{{ producto.nombre }}">

        </div>

        <div class="card-preview">

            <p class="nombre-producto">
                {{ producto.nombre }}
            </p>

            <span class="categoria">
                {{ producto.categoria }}
            </span>

            <p class="precio-preview">
                S/{{ producto.precio }}
            </p>

        </div>

    </article>

    {% endfor %}

</section>

{% endif %}
```

</main>

<div class="modal-overlay" id="modalOverlay">

```
<div class="modal-content" id="modalContent">

    <button class="close-btn"
            id="closeModal">

        &times;

    </button>

    <img id="modalImg"
         class="modal-img">

    <h2 id="modalNombre"></h2>

    <p id="modalCategoria"></p>

    <p id="modalDesc"></p>

    <div class="modal-meta">

        <div>

            <span>Stock</span>
            <strong id="modalStock"></strong>

        </div>

        <div>

            <span>Precio</span>
            <strong id="modalPrecio"></strong>

        </div>

    </div>

    <div class="acciones-producto">

        <a id="btnEditar">

            <button class="btn-editar">
                Editar
            </button>

        </a>

        <a id="btnEliminar">

            <button class="btn-eliminar">
                Eliminar
            </button>

        </a>

    </div>

</div>
```

</div>

<script>

const cards = document.querySelectorAll('.card');

const overlay = document.getElementById('modalOverlay');

const modalContent =
document.getElementById('modalContent');

const btnEditar =
document.getElementById('btnEditar');

const btnEliminar =
document.getElementById('btnEliminar');

cards.forEach(card => {

    card.addEventListener('click', () => {

        document.getElementById('modalImg').src =
            card.dataset.img;

        document.getElementById('modalNombre').textContent =
            card.dataset.nombre;

        document.getElementById('modalCategoria').textContent =
            card.dataset.categoria;

        document.getElementById('modalDesc').textContent =
            card.dataset.desc;

        document.getElementById('modalStock').textContent =
            card.dataset.stock;

        document.getElementById('modalPrecio').textContent =
            "S/" + card.dataset.precio;

        btnEditar.href =
            "/editarProducto/" + card.dataset.id;

        btnEliminar.href =
            "/eliminarProducto/" + card.dataset.id;

        overlay.style.display = "flex";

    });

});

document.getElementById('closeModal')
.addEventListener('click', () => {

    overlay.style.display = "none";

});

overlay.addEventListener('click', e => {

    if(e.target === overlay){

        overlay.style.display = "none";

    }

});

</script>

</body>
</html>
